<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Notes</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { max-width: 700px; margin: 2rem auto; padding: 0 1rem; font-family: system-ui, sans-serif; line-height: 1.6; }
    table { border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 0.4rem 0.8rem; text-align: center; }
    .speak { cursor: pointer; border-radius: 3px; }
    .speak:hover { background: #e0e7ff; }
    .phrase-wrap { display: inline; }
    .phrase-btn { cursor: pointer; font-size: 0.75em; margin-left: 0.2em; opacity: 0.5; }
    .phrase-btn:hover { opacity: 1; }
    nav { margin-bottom: 2rem; }
    nav a { margin-right: 1rem; }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <select id="voice"></select>
  <div id="content"></div>
  <script>
    const JAPANESE = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF\u3000-\u303F]+/g;
    const voiceSelect = document.getElementById("voice");
    let selectedVoice = null;

    function loadVoices() {
      const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith("ja"));
      voiceSelect.innerHTML = "";
      for (const v of voices) {
        const opt = document.createElement("option");
        opt.textContent = v.name;
        opt.value = v.name;
        voiceSelect.appendChild(opt);
      }
      const google = voices.find(v => v.name.startsWith("Google"));
      selectedVoice = google || voices[0] || null;
      if (selectedVoice) voiceSelect.value = selectedVoice.name;
    }

    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
    voiceSelect.onchange = () => {
      selectedVoice = speechSynthesis.getVoices().find(v => v.name === voiceSelect.value);
    };

    async function loadDirLinks(dir) {
      const html = await fetch(dir).then(r => r.text());
      const doc = new DOMParser().parseFromString(html, "text/html");
      return [...doc.querySelectorAll("a")]
        .map(a => a.getAttribute("href"))
        .filter(h => h.endsWith(".md") && !h.startsWith("CLAUDE") && !h.startsWith("README"));
    }

    const nav = document.getElementById("nav");
    nav.innerHTML = '<a href="?clases">clases</a><a href="?words">words</a><a href="?sesiones">sesiones</a>';

    function preprocessPhrases(md) {
      return md.replace(/\{([^}]+)\}/g, (_, inner) => {
        return `<span class="phrase-wrap">${inner}<span class="phrase-btn" data-speech="${inner}">&#9654;</span></span>`;
      });
    }

    function parseFrontmatter(text) {
      const m = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!m) return { meta: {}, body: text };
      const meta = {};
      for (const line of m[1].split("\n")) {
        const i = line.indexOf(":");
        if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
      }
      return { meta, body: m[2] };
    }

    function renderWordHeader(meta) {
      return `<h1>${meta.writing} <small>(${meta.pronunciation})</small></h1>\n<p><em>${meta.type}</em></p>\n`;
    }

    const file = location.search.slice(1) || "lessons/00-gojuuon.md";
    const isWord = file.startsWith("words/");

    function renderIndex(title, dir) {
      loadDirLinks(dir).then(files => {
        files.sort();
        let html = `<h1>${title}</h1><ul>`;
        for (const f of files) {
          const path = dir + f;
          html += `<li><a href="?${path}">${f.replace(".md", "")}</a></li>`;
        }
        html += "</ul>";
        document.getElementById("content").innerHTML = html;
      });
    }

    if (file === "clases") {
      renderIndex("Clases", "lessons/");
    } else if (file === "words") {
      renderIndex("Palabras", "words/");
    } else if (file === "sesiones") {
      renderIndex("Sesiones", "session/");
    } else fetch(file)
      .then(r => r.text())
      .then(md => {
        let html = "";
        if (isWord) {
          const { meta, body } = parseFrontmatter(md);
          html = renderWordHeader(meta) + marked.parse(preprocessPhrases(body));
        } else {
          html = marked.parse(preprocessPhrases(md));
        }
        document.getElementById("content").innerHTML = html;
        document.querySelectorAll(".phrase-btn").forEach(btn => {
          btn.onclick = () => {
            const u = new SpeechSynthesisUtterance(btn.dataset.speech);
            u.lang = "ja-JP";
            if (selectedVoice) u.voice = selectedVoice;
            speechSynthesis.speak(u);
          };
        });
        wrapJapanese(document.getElementById("content"));
      });

    function wrapJapanese(el) {
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);

      for (const node of nodes) {
        if (!JAPANESE.test(node.textContent)) continue;
        JAPANESE.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let last = 0;
        let match;
        while ((match = JAPANESE.exec(node.textContent)) !== null) {
          if (match.index > last) frag.appendChild(document.createTextNode(node.textContent.slice(last, match.index)));
          const span = document.createElement("span");
          span.className = "speak";
          span.textContent = match[0];
          const text = match[0];
          span.onclick = () => {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "ja-JP";
            if (selectedVoice) u.voice = selectedVoice;
            speechSynthesis.speak(u);
          };
          frag.appendChild(span);
          last = JAPANESE.lastIndex;
        }
        if (last < node.textContent.length) frag.appendChild(document.createTextNode(node.textContent.slice(last)));
        node.parentNode.replaceChild(frag, node);
      }
    }
  </script>
</body>
</html>
